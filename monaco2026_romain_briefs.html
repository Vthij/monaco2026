const TC={"SEO":{"b":"#22d3ee22","br":"#22d3ee55","tx":"#22d3ee"},"GEO":{"b":"#a855f722","br":"#a855f755","tx":"#a855f7"},"CRM":{"b":"#f9731622","br":"#f9731655","tx":"#f97316"},"MEDIA":{"b":"#ec489922","br":"#ec489955","tx":"#ec4899"},"CONTENT":{"b":"#84cc1622","br":"#84cc1655","tx":"#84cc16"},"SOCIAL":{"b":"#06b6d422","br":"#06b6d455","tx":"#06b6d4"},"CRO":{"b":"#64748b22","br":"#64748b55","tx":"#64748b"},"DATA":{"b":"#fbbf2422","br":"#fbbf2455","tx":"#fbbf24"}};
const M=[{"d": "Lun 10 Mars", "t": "10:30→10:55", "c": "ORANGE FRANCE", "s": "Télécom — CRO, IA & Personnalisation", "a": "#f97316", "tg": ["CRO", "DATA", "MEDIA"], "ct": [{"n": "Nasser AL MALT", "r": "Directeur E-Commerce et relation client digitale"}, {"n": "Julien PICARD", "r": "Directeur parcours client équipement"}, {"n": "Hugues PRADEL", "r": "Directeur adjoint Digital, Transformation, Data et Excellence clients"}], "cx": "Opérateur télécom majeur. 3 contacts de très haut niveau dont le Directeur E-Commerce et le Directeur Transformation. Vision claire : utiliser l'IA pour expérimenter, personnaliser l'expérience visiteur en temps réel, préserver la marge et améliorer le CRO sur les apps Orange & Moi.", "p": [{"l": "IA au service de l'expérimentation & CRO", "d": "Prompts IA efficaces pour développer le DIY, l'IA au service du business et de la préservation de la marge", "p": "h"}, {"l": "Personnalisation temps réel via IA", "d": "La bonne offre au bon moment au bon endroit — personnalisation visiteur en temps réel", "p": "h"}, {"l": "CRO & AB Testing sur apps Orange & Moi", "d": "Expérimentations ciblées, recommandations produits, personnalisation sur les applications", "p": "h"}, {"l": "Reco produits & personnalisation", "d": "Personnaliser l'expérience en temps réel grâce à l'IA", "p": "h"}], "an": "Orange cherche à mettre l'IA au service du CRO et de la personnalisation — c'est le cœur de la proposition Y&N sur ce RDV. L'angle 'préservation de la marge' est clé : montrer comment l'IA peut optimiser les campagnes et les parcours pour réduire le coût d'acquisition tout en augmentant la conversion.", "op": "Sur la personnalisation en temps réel, est-ce que vous avez aujourd'hui une infrastructure data qui vous permet de réagir au comportement visiteur en moins d'une seconde, ou c'est encore l'objectif à atteindre ?", "w": "3 contacts très seniors = ne pas partir dans tous les sens. Premier RDV du salon — être en forme et avoir un pitch précis. Identifier rapidement qui pilote le budget sur les projets CRO/IA (probablement Hugues PRADEL sur la transformation). Orange = processus d'achat long."}, {"d": "Lun 10 Mars", "t": "11:00→11:25", "c": "TIKAMOON", "s": "Mobilier — E-commerce & Social Commerce", "a": "#22d3ee", "tg": ["GEO", "SEO", "SOCIAL", "CRO"], "ct": [{"n": "William ROGER", "r": "Head of CRO"}, {"n": "Lolita SAINT-MAXENT", "r": "Directrice e-commerce"}], "cx": "E-commerçant mobilier avec une vision très avancée du digital. 4 projets bien formulés avec des échéances court terme (CT) et moyen terme (MT). Le Head of CRO + la Directrice e-commerce = deux angles complémentaires et très opérationnels.", "p": [{"l": "GSO — Être la source n°1", "d": "Objectif d'être la source de référence citée par les LLMs sur le mobilier — CT", "p": "h"}, {"l": "Conversationnel — Parcours client", "d": "Accompagner le client dans son parcours via l'IA conversationnelle, rejeter les parcours figés — CT", "p": "h"}, {"l": "Communauté — Réseaux sociaux 1-to-1", "d": "Utiliser les RS pour créer une communauté et interagir avec les clients en direct — CT/MT", "p": "m"}, {"l": "Social Commerce", "d": "Utilisation des réseaux sociaux pour faire du commerce directement — CT/MT", "p": "m"}], "an": "Le projet GSO (être la source n°1 dans les LLMs) est exactement ce que Y&N adresse avec Hubble + GEO. Démontrer en live : chercher 'canapé scandinave pas cher' ou 'meuble salon bois massif' dans ChatGPT — est-ce que Tikamoon apparaît ? William ROGER est Head of CRO = conversation très technique possible. Ne pas l'ennuyer avec des généralités.", "op": "Sur l'objectif d'être la source n°1 dans les LLMs pour le mobilier, est-ce que vous avez déjà une baseline de là où vous en êtes aujourd'hui par rapport à Maisons du Monde ou Made.com ?", "w": "Head of CRO = profil très technique et exigeant. Préparer des données concrètes sur la visibilité LLM dans le secteur mobilier. Lolita (Directrice e-commerce) est plus stratégique. Adresser les deux niveaux sans créer de confusion."}, {"d": "Lun 10 Mars", "t": "11:30→11:55", "c": "NUTRIPURE", "s": "Nutrition / Compléments — E-commerce & International", "a": "#84cc16", "tg": ["SEO", "GEO", "CRO", "MEDIA"], "ct": [{"n": "Anaïs POUPONNEAU", "r": "Responsable Acquisition"}], "cx": "Marque de nutrition et compléments alimentaires D2C. 3 projets précis et bien formulés : SEO international avec IA, CRO conversationnel avec agents IA, et structuration internationale scalable. Vision ambitieuse d'expansion multi-pays.", "p": [{"l": "SEO Avancé & Expansion Internationale", "d": "IA & Géo-SEO, architecture technique SEO scalable pour déploiement multi-pays sans duplication", "p": "h"}, {"l": "CRO — Agents IA Conversationnels", "d": "Intégration d'agents intelligents pour fluidifier le parcours client, réduire la friction avant-vente, booster le panier", "p": "h"}, {"l": "Structuration Internationale", "d": "Architecture technique pour soutenir le déploiement multi-pays efficacement", "p": "h"}], "an": "3 projets dans le cœur de cible Y&N. Sur le SEO international avec IA : le Content Factory IA Gen peut produire du contenu localisé à grande échelle. Sur le GEO/LLM : compléments alimentaires = requêtes massives dans ChatGPT ('quel complément pour X'). Hubble en live sur des requêtes nutrition pour montrer la visibilité Nutripure vs concurrents.", "op": "Sur l'expansion internationale, vous visez quels marchés en priorité — et est-ce que votre infrastructure SEO actuelle est vraiment prête à scaler sans créer de contenu dupliqué ?", "w": "Responsable Acquisition = opérationnelle, pas forcément la décisionnaire finale sur les projets d'expansion. Identifier qui valide les budgets internationaux. Nutrition/santé = contraintes réglementaires sur le contenu — ne pas sur-promettre sur l'automatisation."}, {"d": "Lun 10 Mars", "t": "15:30→15:55", "c": "SNOWLEADER", "s": "Sport Outdoor — E-commerce & Retail (Hyper-croissance)", "a": "#3498db", "tg": ["MEDIA", "SEO", "GEO", "CONTENT"], "ct": [{"n": "Thomas ROUAULT", "r": "CEO"}, {"n": "Amandine ROUSSEAU", "r": "Directrice marketing"}], "cx": "E-commerçant et retailer sport outdoor en hyper-croissance en France et en Europe. Le CEO + la Directrice marketing en personne — niveau de décision très élevé. Brief volontairement ouvert : 'à la recherche de solutions pour accompagner cette croissance'.", "p": [{"l": "Accompagner la croissance — tous leviers", "d": "En hyper-croissance France et Europe, ouvert à toutes les bonnes solutions", "p": "h"}, {"l": "E-commerce & Retail", "d": "Optimiser et scaler les canaux e-commerce et retail simultanément", "p": "h"}, {"l": "Acquisition & Notoriété", "d": "Structurer l'acquisition pour soutenir la croissance sans exploser les coûts", "p": "m"}, {"l": "International Europe", "d": "Continuer l'expansion européenne avec les bons partenaires", "p": "m"}], "an": "Brief ouvert = opportunité de qualifier les vrais enjeux. CEO + Directrice marketing en simultané = décision rapide possible. Y&N doit identifier le goulot d'étranglement de la croissance (acquisition ? contenu à scaler ? visibilité internationale ?) et se positionner comme le partenaire qui accompagne sans ralentir.", "op": "Sur cette phase d'hyper-croissance, qu'est-ce qui est en train de craquer en ce moment — l'acquisition qui coûte de plus en plus cher, le contenu qui ne scale pas, ou la visibilité internationale ?", "w": "CEO = peut décider vite mais attend une vision claire, pas un catalogue de services. Ne pas lister tout ce que Y&N sait faire — identifier le problème principal et proposer une solution précise. Brief très ouvert = risque de conversation dispersée. Cadrer dès le départ."}, {"d": "Lun 10 Mars", "t": "16:00→16:25", "c": "HARIBO", "s": "FMCG — CRM, Drive-to-Store & Expérience client", "a": "#fbbf24", "tg": ["CRM", "MEDIA", "DATA"], "ct": [{"n": "Mélanie VIE HOFMANN", "r": "Responsable CRM"}], "cx": "Leader mondial de la confiserie. Mélanie est Responsable CRM — profil très opérationnel sur Salesforce Marketing Cloud (SFMC). 3 projets concrets : CRM/reporting SFMC, avis clients et expérience en boutique, drive-to-store.", "p": [{"l": "CRM SFMC — Reporting & Dashboards", "d": "Mise en place de reporting sur SFMC, dashboards, tracking", "p": "h"}, {"l": "Avis clients & Expérience boutique", "d": "Client mystère, expérience client en boutique — qualité et cohérence", "p": "h"}, {"l": "Drive-to-store", "d": "Générer du trafic en boutiques et en ligne via campagnes médias et CRM", "p": "h"}], "an": "Y&N peut se positionner sur le CRM SFMC (reporting, dashboards, automation) et sur les campagnes drive-to-store (Y&N MEDIA). Haribo est une marque FMCG avec un réseau de distribution massif — le drive-to-store via CRM + media est un cas d'usage fort. Le GEO/LLM est moins évident sur la confiserie mais peut ouvrir un angle de différenciation.", "op": "Sur le reporting SFMC, est-ce que vous avez aujourd'hui une vision unifiée des performances CRM par segment de clients, ou vous travaillez encore sur des extractions manuelles ?", "w": "Responsable CRM = opérationnelle sur SFMC. S'assurer que Y&N a une vraie expertise SFMC à mettre en avant. Les avis clients et l'expérience boutique sont plus proches d'une agence terrain — identifier si c'est vraiment dans notre périmètre ou si on réoriente vers le CRM + drive-to-store."}, {"d": "Lun 10 Mars", "t": "16:30→16:55", "c": "MMJ", "s": "Mode / Bijoux — Marketing & Communication", "a": "#ec4899", "tg": ["CONTENT", "SOCIAL", "SEO"], "ct": [{"n": "Afifa GUERRAH", "r": "Responsable Marketing & Communication"}], "cx": "Marque de mode et/ou bijoux. Peu d'informations disponibles sur les projets spécifiques dans la base. Responsable Marketing & Communication = profil communication et brand. RDV qui nécessitera une phase de découverte.", "p": [{"l": "Marketing digital & Acquisition", "d": "Développer les leviers d'acquisition et de visibilité digitale", "p": "h"}, {"l": "Contenu & Brand", "d": "Contenu cohérent et impactant pour la marque", "p": "h"}, {"l": "Social Media", "d": "Stratégie social media adaptée au secteur mode/bijoux", "p": "m"}, {"l": "SEO / GEO", "d": "Visibilité organique et présence dans les LLMs sur les requêtes mode/bijoux", "p": "m"}], "an": "Peu d'informations = commencer par découvrir les vrais enjeux. Responsable Marketing & Communication dans une marque mode/bijoux = probablement sensible au contenu, à la brand et au social. Y&N Content Factory + Social peuvent résonner. Le GEO/LLM sur les requêtes 'bijoux tendance' ou 'collier or femme' dans ChatGPT est un angle d'ouverture naturel.", "op": "Aujourd'hui, quel est le levier qui vous donne le plus de satisfaction dans votre marketing digital — et celui qui vous frustre le plus ?", "w": "Peu d'informations disponibles = phase de découverte obligatoire. Ne pas forcer une proposition avant de comprendre les vrais enjeux. Identifier si Afifa est la décisionnaire sur les budgets ou si quelqu'un au-dessus d'elle valide."}, {"d": "Lun 10 Mars", "t": "17:00→17:25", "c": "THE BRADERY", "s": "Mode — Vente Événementielle & E-commerce (Shopify)", "a": "#a855f7", "tg": ["MEDIA", "CRO", "DATA", "SEO"], "ct": [{"n": "Edouard CARACO", "r": "Co-Founder"}, {"n": "Timothée LINYER", "r": "Co-Founder"}], "cx": "Plateforme de vente événementielle mode (ventes privées). Les 2 co-fondateurs viennent en personne — décision rapide garantie. Vision pragmatique : améliorer la performance globale. Sur Shopify, cherchent des solutions faciles à mettre en place.", "p": [{"l": "Performance globale — tous leviers", "d": "Améliorer la performance globale de The Bradery. 'Toutes les bonnes idées sont bonnes à prendre'", "p": "h"}, {"l": "Solutions Shopify-native", "d": "Cherchent des solutions faciles à intégrer sur Shopify", "p": "h"}, {"l": "Acquisition & Rétention", "d": "Optimiser l'acquisition et la rétention clients sur une base ventes événementielles", "p": "m"}], "an": "2 co-fondateurs = décision immédiate possible si la proposition est claire. Brief ouvert + Shopify = qualifier rapidement ce qui leur fait le plus mal. Y&N doit identifier si le problème est l'acquisition (MEDIA), la conversion (CRO), ou la rétention (CRM). Le modèle flat-rate Netflix est parfait pour une startup en croissance qui veut accéder à plusieurs expertises.", "op": "Sur Shopify aujourd'hui, c'est quoi votre plus grand point de douleur — la conversion des visiteurs, l'acquisition de nouveaux clients, ou la rétention de ceux que vous avez déjà ?", "w": "Co-fondateurs = pragmatiques et directs, pas de bullshit. Aller vite sur la valeur concrète. 'Solutions faciles à mettre en place sur Shopify' = ne pas proposer des projets de 6 mois. Avoir 2-3 quick wins concrets prêts."}, {"d": "Lun 10 Mars", "t": "18:00→18:25", "c": "ADOVA GROUP", "s": "Literie Premium — E-commerce & Expérience Digitale (Simmons)", "a": "#e67e22", "tg": ["CRO", "SEO", "GEO", "MEDIA"], "ct": [{"n": "François PECK", "r": "Responsable E-commerce et marketing digital"}], "cx": "Groupe qui pilote la marque Simmons (literie premium). Refonte et optimisation du site e-commerce en cours avec double objectif : améliorer l'UX sur des produits à fort panier moyen et augmenter la performance commerciale (conversion, lead, drive-to-store).", "p": [{"l": "Refonte & Optimisation e-commerce Simmons", "d": "UX/UI, tunnel d'achat, mise en valeur des gammes stratégiques, paiement fractionné", "p": "h"}, {"l": "CRO — Conversion & Lead", "d": "Optimiser la conversion et la génération de leads sur des produits premium à fort panier moyen", "p": "h"}, {"l": "Drive-to-store", "d": "Générer du trafic en point de vente depuis le digital", "p": "h"}, {"l": "SEO / GEO", "d": "Visibilité organique et LLMs sur les requêtes literie premium", "p": "m"}], "an": "Produit premium à fort panier moyen (literie) = le CRO est critique — chaque point de conversion compte. Y&N peut se positionner sur le CRO + SEO/GEO. Sur le GEO/LLM : 'meilleur matelas premium' ou 'literie haut de gamme' dans ChatGPT = requêtes en forte croissance. Hubble en live pour montrer la visibilité Simmons vs Treca vs Tempur.", "op": "Sur la conversion, est-ce que vous savez aujourd'hui à quelle étape du tunnel vous perdez le plus de visiteurs — la fiche produit, la configuration, ou le checkout ?", "w": "Responsable E-commerce et marketing digital = opérationnel, probablement pas seul décisionnaire sur la refonte. Identifier qui valide les budgets importants. Le paiement fractionné n'est pas le terrain Y&N — rester sur CRO + SEO/GEO + drive-to-store."}, {"d": "Mer 11 Mars", "t": "10:30→10:55", "c": "SEPHORA", "s": "Beauté — Retail Global (LVMH) — Sourcing Tech & Digital", "a": "#c0392b", "tg": ["DATA", "CONTENT", "GEO"], "ct": [{"n": "Pauline GUILLAUME", "r": "Global Purchaser IT & Digital"}, {"n": "François LAGEAT", "r": "Global Sourcing Senior Manager Tech & Digital"}], "cx": "Leader mondial de la beauté (LVMH). Contexte de globalisation des achats Tech & Digital pour les régions EME, LATAM, NORAM, SEA et Chine. Blueprint Sephora Global en cours de construction. Deux profils sourcing/achat IT — pas des marketeurs.", "p": [{"l": "IA & Hyperpersonnalisation", "d": "Partenaires capables d'intégrer le blueprint Sephora Global — IA et hyperpersonnalisation", "p": "h"}, {"l": "Connaissance client", "d": "Solutions de connaissance client avancée", "p": "h"}, {"l": "Innovation Retail", "d": "Toute proposition d'innovation en retail — expériences en magasin ou sur plateformes web/mobile", "p": "m"}], "an": "Sephora cherche des partenaires pour leur blueprint global — c'est un appel d'offres déguisé. Pauline et François sont des acheteurs IT/Digital, pas des marketeurs. Y&N doit se positionner sur la valeur business (IA pour la personnalisation, GEO pour la visibilité LLM beauté) tout en répondant aux critères d'un acheteur : fiabilité, références, capacité à s'intégrer dans un blueprint global.", "op": "Sur le blueprint Sephora Global, est-ce que vous cherchez des partenaires qui couvrent plusieurs régions simultanément, ou des spécialistes par marché ?", "w": "Profils acheteurs IT, pas des marketeurs — adapter le discours. Éviter le jargon marketing pur, parler ROI, intégration, scalabilité. Le scope global (EME, LATAM, NORAM, SEA, Chine) est ambitieux — être honnête sur ce que Y&N peut vraiment couvrir."}, {"d": "Mer 11 Mars", "t": "12:00→12:25", "c": "HAIRSTORE.FR", "s": "Beauté / Coiffure — E-commerce Multi-canal", "a": "#f97316", "tg": ["MEDIA", "DATA", "SEO", "GEO"], "ct": [{"n": "Mathieu BONIFACIE", "r": "Directeur Général Adjoint"}, {"n": "Nolwenn CLARISSE", "r": "Marketing"}], "cx": "E-commerçant spécialisé dans les produits capillaires professionnels. DGA + Marketing = deux niveaux complémentaires. Deux projets bien formulés : acquisition multi-canale avancée et unification de la data marketing.", "p": [{"l": "Acquisition multi-canale — Meta, Google, TikTok", "d": "Optimiser l'acquisition payante, améliorer la rentabilité, automatiser l'allocation budgétaire, identifier de nouveaux leviers à ROI maîtrisé", "p": "h"}, {"l": "Unification data marketing — CDP & Attribution", "d": "CDP, tracking post-cookie, attribution multi-touch — reconstruire une vision unifiée de la data client", "p": "h"}, {"l": "GEO / LLM", "d": "Visibilité dans les LLMs sur les requêtes coiffure et soins capillaires", "p": "m"}], "an": "Deux projets dans le cœur de Y&N : l'acquisition multi-canale (Y&N MEDIA) et la data/CDP (Y&N DATA). L'argument flat-rate Netflix est fort ici — ils ont besoin des deux expertises en même temps sans multiplier les agences. Sur le GEO : 'meilleur shampoing professionnel pour cheveux colorés' dans ChatGPT = requêtes de plus en plus fréquentes.", "op": "Sur l'attribution multi-touch, est-ce que vous avez aujourd'hui une vision claire de la contribution de chaque canal (Meta, Google, TikTok) dans le parcours d'achat — ou vous naviguez encore en partie à l'aveugle ?", "w": "DGA = décisionnaire, Nolwenn = opérationnelle. Adresser les deux niveaux. Ne
