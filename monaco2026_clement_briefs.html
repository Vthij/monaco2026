const TC={"SEO":{"b":"#22d3ee22","br":"#22d3ee55","tx":"#22d3ee"},"GEO":{"b":"#a855f722","br":"#a855f755","tx":"#a855f7"},"CRM":{"b":"#f9731622","br":"#f9731655","tx":"#f97316"},"MEDIA":{"b":"#ec489922","br":"#ec489955","tx":"#ec4899"},"CONTENT":{"b":"#84cc1622","br":"#84cc1655","tx":"#84cc16"},"SOCIAL":{"b":"#06b6d422","br":"#06b6d455","tx":"#06b6d4"},"CRO":{"b":"#64748b22","br":"#64748b55","tx":"#64748b"},"DATA":{"b":"#fbbf2422","br":"#fbbf2455","tx":"#fbbf24"}};
const M=[{"d": "Lun 10 Mars", "t": "15:30→15:55", "c": "EURONICS", "s": "Retail International — Électrodomestiques (EMEA)", "a": "#e67e22", "tg": ["SEO", "GEO", "MEDIA", "DATA"], "ct": [{"n": "Denis BOSCHARD", "r": "COO"}], "cx": "Groupe international de retailers nationaux opérant en EMEA (électrodomestiques). Approche omnicanale. Le COO se déplace en personne à Monaco — niveau de décision maximal. Priorités stratégiques : e-commerce, marketplace, retail media et IA dans les parcours clients.", "p": [{"l": "E-commerce & Marketplace", "d": "Stratégie e-commerce et activités marketplace omnicanales à l'échelle internationale", "p": "h"}, {"l": "Retail Media", "d": "Développement du retail media comme levier de monétisation du groupe", "p": "h"}, {"l": "IA dans les parcours clients", "d": "Intégration de l'IA globalement dans les parcours clients Euronics", "p": "h"}, {"l": "SEO / GEO", "d": "Visibilité SEO et présence dans les LLMs sur les requêtes électrodomestiques", "p": "m"}], "an": "Le COO d'un groupe international = vision stratégique et ROI avant tout. Y&N doit se positionner comme partenaire de transformation, pas comme exécutant. Le retail media est un sujet Y&N MEDIA direct. L'IA dans les parcours ouvre le Content Factory. La dimension multi-pays de Euronics joue en faveur de notre expertise central-to-local.", "op": "Sur l'intégration de l'IA dans les parcours clients, est-ce que vous avez une feuille de route prioritaire par pays ou vous cherchez une approche globale à décliner localement ?", "w": "COO = décisionnaire stratégique. Rester sur la vision et le ROI, ne pas rentrer dans le détail opérationnel. Identifier quelles enseignes nationales sont les plus avancées et les plus réceptives pour un pilote."}, {"d": "Lun 10 Mars", "t": "17:30→17:55", "c": "OPTIC 2000", "s": "Optique — Retail & E-commerce (France)", "a": "#3498db", "tg": ["CRM", "CONTENT", "SEO", "SOCIAL"], "ct": [{"n": "Alexandre JOURDAN", "r": "Responsable digital"}], "cx": "Leader de l'optique en France. Multiple projets tech et digital en cours : marketplace opticiens, chatbot, TikTok Shop, programme de fidélité (Comarch), replatforming, moteur de recherche interne. Profil digital très actif avec un agenda chargé.", "p": [{"l": "Marketplace opticiens", "d": "Développement d'une marketplace interne pour les opticiens du réseau", "p": "h"}, {"l": "Programme de fidélité — Comarch", "d": "Mise en place d'un programme fidélité — solution Comarch en cours de déploiement", "p": "h"}, {"l": "TikTok Shop", "d": "Développement du commerce social sur TikTok", "p": "h"}, {"l": "Chatbot", "d": "Déploiement d'un chatbot pour l'expérience client digitale", "p": "m"}, {"l": "Moteur de recherche interne", "d": "Évolution du moteur de recherche interne du site", "p": "m"}, {"l": "Replatforming", "d": "Refonte de la plateforme e-commerce — hors périmètre Y&N", "p": "l"}], "an": "Y&N ne peut pas se positionner sur le replatforming ou le moteur de recherche interne. Nos terrains clairs : le TikTok Shop (SOCIAL + CONTENT), la stratégie CRM si Comarch n'est pas encore verrouillé, et le GEO/SEO pour une marque optique où les requêtes 'opticien pas cher Paris' migrent vers les LLMs.", "op": "Sur le programme fidélité avec Comarch — vous êtes déjà en phase de déploiement ou encore en sélection finale de partenaires ?", "w": "Responsable digital = opérationnel. Identifier qui au-dessus de lui valide les budgets importants. Ne pas s'éparpiller sur les 6 projets — choisir 2 sujets maximum où Y&N peut créer de la valeur immédiate. Le replatforming est une fausse piste."}, {"d": "Lun 10 Mars", "t": "18:30→18:55", "c": "KINGFISHER", "s": "Bricolage — Retail International (Castorama, B&Q…)", "a": "#27ae60", "tg": ["MEDIA", "DATA", "GEO"], "ct": [{"n": "Gilles ALLEXANDRE", "r": "Head of Marketing & Business Services"}, {"n": "Christophe COPPENOLLE", "r": "Performance Marketing & Analytics Director — Castorama"}, {"n": "Nicolas WERQUIN", "r": "Group Category Director Marketing & Digital"}], "cx": "Groupe mondial du bricolage (Castorama, B&Q, Brico Dépôt…). 3 contacts de haut niveau dont le Performance Marketing Director de Castorama. Enjeux stratégiques e-commerce, marketplace, retail media et IA dans les parcours clients à l'échelle groupe.", "p": [{"l": "E-commerce & Marketplace", "d": "Stratégie e-commerce et développement des activités marketplace", "p": "h"}, {"l": "Retail Media", "d": "Retail media comme levier de monétisation du groupe Kingfisher", "p": "h"}, {"l": "IA dans les parcours clients", "d": "Intégration de l'IA globalement dans les parcours clients", "p": "h"}, {"l": "Performance Marketing & Analytics — Castorama", "d": "Mesure de la performance, attribution, analytics avancés", "p": "h"}], "an": "3 contacts en simultané = gérer les 3 niveaux. Christophe COPPENOLLE (Performance Marketing Castorama) est l'interlocuteur le plus opérationnel et le plus actionnable à court terme. Y&N MEDIA peut se positionner sur le paid + analytics. La dimension multi-pays de Kingfisher joue en faveur de notre expertise central-to-local.", "op": "Sur la performance marketing chez Castorama, est-ce que vous avez aujourd'hui une vision unifiée de l'attribution entre les leviers digitaux et le drive-to-store ?", "w": "3 contacts = risque de conversation dans tous les sens. Identifier rapidement qui pilote quoi et adresser chacun sur son périmètre. Ne pas essayer de tout couvrir en 25 minutes. Choisir un fil directeur — probablement la performance Castorama."}, {"d": "Mer 11 Mars", "t": "10:30→10:55", "c": "SAMSONITE FRANCE", "s": "Bagagerie Premium — E-commerce International", "a": "#9b59b6", "tg": ["GEO", "SEO", "MEDIA", "CONTENT"], "ct": [{"n": "Edouard WATTEL", "r": "VP Digital & E-commerce"}, {"n": "Marie-Laure GUERPILLON", "r": "Directrice digitale et communication France & Lipault Intl"}, {"n": "Laura DEMARET", "r": "Digital & E-commerce Manager"}], "cx": "Leader mondial de la bagagerie. 3 contacts dont le VP Digital & E-commerce. Projets bien définis : customer experience, AI acceleration, SEO/GEO, optimisation de l'acquisition. Contexte international — marque distribuée dans le monde entier.", "p": [{"l": "AI Acceleration", "d": "Accélérer l'intégration de l'IA dans tous les processus digitaux en 2026", "p": "h"}, {"l": "SEO / GEO", "d": "Optimisation SEO et positionnement dans les LLMs", "p": "h"}, {"l": "Acquisition optimization", "d": "Diversification des leviers, Media Mix Modeling, media planning", "p": "h"}, {"l": "Customer Experience & Guidance", "d": "Améliorer l'expérience et le guidage client sur les plateformes", "p": "h"}, {"l": "Agility in-house", "d": "Meilleure maintenance des plateformes et plus d'agilité interne", "p": "m"}], "an": "Samsonite a une vision claire et un budget à la hauteur d'une marque mondiale. Le SEO/GEO est explicitement cité — Hubble en live sur des requêtes 'valise cabine pas cher', 'meilleur bagage voyage affaires' dans les LLMs. Sur l'AI Acceleration : le Content Factory IA Gen répond à la fois sur le contenu et sur l'automatisation des processus marketing.", "op": "Sur l'AI Acceleration, vous êtes plutôt en phase d'exploration ou vous avez déjà des cas d'usage précis où vous voulez déployer avant la fin 2026 ?", "w": "3 contacts = dynamique de groupe à gérer. Edouard WATTEL (VP Digital) est le décisionnaire principal. Laura DEMARET est l'opérationnelle — elle sera la plus précise sur les besoins concrets. Ne pas adresser les 3 de la même façon en simultané."}, {"d": "Mer 11 Mars", "t": "11:00→11:25", "c": "CLARINS", "s": "Beauté / Skincare — E-commerce International", "a": "#e84393", "tg": ["MEDIA", "SEO", "CONTENT", "SOCIAL"], "ct": [{"n": "Adeline FERET", "r": "Head of Digital Media Europe"}, {"n": "Eilidh STEWART", "r": "E-commerce and Digital Director Europe"}], "cx": "Groupe beauté premium, leader du skincare naturel. Contexte d'inflation et de pression sur les coûts de diffusion. Objectif : aller plus loin en search et social en baissant les coûts pour maintenir un très bon niveau de rentabilité.", "p": [{"l": "Performance Marketing — Search + Social", "d": "Aller plus loin en baissant les coûts de diffusion dans un contexte d'inflation", "p": "h"}, {"l": "Social, Influence & Partenariats", "d": "Créer des contenus pertinents par plateforme pour une meilleure captivité des audiences", "p": "h"}, {"l": "GEO / LLM Skincare", "d": "Positionnement dans les LLMs pour les requêtes skincare naturel", "p": "m"}, {"l": "Réduction des coûts de production contenu", "d": "Optimiser les coûts tout en maintenant la qualité de contenu premium", "p": "m"}], "an": "La problématique Clarins est double : faire plus avec moins de budget, et maintenir la qualité de contenu premium. C'est exactement la promesse du Content Factory IA Gen. Y&N MEDIA peut se positionner sur le Search + Social avec une logique de performance. Sur le GEO : les requêtes skincare naturel dans les LLMs sont en forte croissance.", "op": "Sur la réduction des coûts de diffusion, où perdez-vous le plus de rentabilité aujourd'hui — Search, Social, ou production de contenu ?", "w": "Head of Digital Media (paid/media) et E-commerce Digital Director (plus stratégique) — deux angles différents à adresser sans créer de confusion. Ne pas promettre des réductions de coûts irréalistes."}, {"d": "Mer 11 Mars", "t": "11:30→11:55", "c": "ID GARAGES", "s": "Automobile — Marketplace Réparation B2C + B2B (International)", "a": "#e8a838", "tg": ["SEO", "GEO", "MEDIA"], "ct": [{"n": "Fabien BORSA", "r": "CEO"}], "cx": "Marketplace de services automobiles (réparation, entretien) en France et en expansion internationale (NL, ES, IT, PT). Le CEO vient en personne. Projets très concrets avec des échéances 2026 claires.", "p": [{"l": "Agence SEO — France", "d": "Recherche d'une agence SEO — échéance 2026 / périmètre France", "p": "h"}, {"l": "Internationalisation B2B et B2C", "d": "Déploiement NL, ES, IT, PT — 2026", "p": "h"}, {"l": "IA dans les parcours clients", "d": "Intégration de l'IA dans les parcours B2C et B2B — 2026-2027", "p": "h"}, {"l": "Optimisation du paiement B2C", "d": "France et international — 2026", "p": "m"}, {"l": "Renforcement gammes services B2B", "d": "Offre élargie pour les réparateurs (TPE, réseaux) — hors périmètre Y&N", "p": "l"}], "an": "'Agence SEO' est explicitement mentionné — c'est une opportunité de pitch direct. Y&N peut se positionner sur le SEO France + GEO (requêtes 'garage réparation voiture Paris' dans les LLMs), et immédiatement différencier avec notre expertise multi-pays pour l'internationalisation. Le CEO = décision rapide possible.", "op": "Pour l'expansion internationale, est-ce que vous cherchez un partenaire capable de gérer la cohérence globale tout en adaptant localement — ou une agence par pays ?", "w": "CEO = peut décider vite mais attend une proposition nette. Avoir une proposition SEO concrète prête (scope, timeline, livrables). Ne pas se disperser sur tous les sujets — concentration sur SEO + international qui sont les priorités 2026 claires."}, {"d": "Mer 11 Mars", "t": "12:00→12:25", "c": "DR PIERRE RICAUD", "s": "Beauté / Skincare — D2C", "a": "#c0392b", "tg": ["CONTENT", "GEO", "CRO"], "ct": [{"n": "Charles-Edouard DRABER", "r": "Responsable Expérience client digital & Innovation"}], "cx": "Marque skincare D2C française. Profil innovation très marqué — le responsable couvre à la fois l'expérience client digitale ET l'innovation. Projets IA nombreux et précis pour 2026, tous très concrets.", "p": [{"l": "Chatbot AI — Service client & Expert produit", "d": "Chatbot IA pour les utilisateurs (service client + expertise produit)", "p": "h"}, {"l": "Visibilité LLM / GEO", "d": "Être présent dans les LLMs sur les requêtes skincare — technique et contenu", "p": "h"}, {"l": "Production d'assets via AI", "d": "Génération d'assets visuels et contenus via IA", "p": "h"}, {"l": "CRO — Optimisation website", "d": "Amélioration du taux de conversion sur le site", "p": "h"}, {"l": "Diagnostic visage AI", "d": "Fonctionnalité de diagnostic IA pour personnaliser les recommandations — plus produit/tech", "p": "m"}, {"l": "Abonnement produit", "d": "Développement d'un modèle d'abonnement", "p": "m"}], "an": "Interlocuteur ultra-réceptif à l'IA — tous ses projets 2026 sont IA-first. Y&N peut répondre directement sur : GEO/LLM visibility (Hubble), production assets via AI (Content Factory), et CRO. Le chatbot AI et le diagnostic visage sont plus produit/tech — Y&N peut être apporteur de solutions partenaires.", "op": "Sur la visibilité LLM, est-ce que vous avez déjà un monitoring pour savoir où vous en êtes par rapport à vos concurrents (Clarins, Caudalie…) dans les réponses ChatGPT ?", "w": "Interlocuteur innovation = risque de partir dans tous les sens. Garder le focus sur ce que Y&N peut concrètement exécuter vs ce qui relève de partenaires tech. Ne pas promettre le chatbot ou le diagnostic IA — ce n'est pas notre core."}, {"d": "Mer 11 Mars", "t": "13:30→13:55", "c": "RACETOOLS", "s": "E-commerce Automobile — Pièces & Accessoires Racing", "a": "#f39c12", "tg": ["MEDIA", "SEO"], "ct": [{"n": "Mehdi MEDJOUBI", "r": "Directeur Marketing Digital"}], "cx": "E-commerçant spécialisé pièces et accessoires pour la course automobile. Marché de niche très technique. Deux projets listés très précis et opérationnels : paiement fractionné B2B et repricing automatique.", "p": [{"l": "Paiement fractionné B2B", "d": "Solution de paiement en plusieurs fois pour transactions B2B — hors périmètre Y&N direct", "p": "h"}, {"l": "Veille concurrence & Repricing automatique", "d": "Solution de veille concurrentielle et ajustement automatique des prix — hors périmètre Y&N direct", "p": "h"}, {"l": "Acquisition digitale — sujet non exprimé", "d": "En tant que Directeur Marketing Digital, il a forcément des enjeux d'acquisition à découvrir", "p": "m"}], "an": "Les deux projets listés sont hors périmètre Y&N (paiement, repricing). L'enjeu de ce RDV : identifier ce qui se cache derrière. Un Direct
