al", "d": "Optimisation SEO/GEO dans un contexte multi-pays, multi-marques", "p": "h"}, {"l": "Accélération livraison plateformes", "d": "Améliorer qualité et fiabilité des interfaces digitales — agilité accrue", "p": "h"}, {"l": "Efficacité équipes marketing", "d": "IA au service de l'efficacité opérationnelle des équipes", "p": "m"}], "an": "Cas d'usage idéal pour le Content Factory IA Gen : plusieurs marques (Ducray, Avène…), multi-pays, besoin de contenu pharma/dermo de qualité à grande échelle. GEO/LLM crucial : 'traitement peau sèche', 'shampooing anti-chute naturel' dans ChatGPT = millions de requêtes. Hubble pour montrer la visibilité des marques Pierre Fabre vs La Roche-Posay, CeraVe.", "op": "Sur les marques du groupe, est-ce que chaque marque gère sa présence dans les LLMs indépendamment, ou vous cherchez une approche centralisée avec une déclinaison par marque ?", "w": "3 contacts en simultané — bien les distinguer. Jimi KELLY (IT/Web), Fabien PEDICA (e-commerce business), Jean Pierre MICHALON (relation business globale). Contraintes réglementaires pharma sur le contenu — ne pas sur-promettre sur l'automatisation. Premier RDV du mardi = être en forme et avoir un pitch précis."}, {"d": "Mer 11 Mars", "t": "10:00→10:25", "c": "E.LECLERC", "s": "Grande Distribution — Marketplace & E-commerce", "a": "#e84393", "tg": ["CRO", "SEO", "MEDIA"], "ct": [{"n": "Virginie BOUTET", "r": "Responsable Marketplace"}], "cx": "E.Leclerc, acteur majeur de la grande distribution française. Virginie est Responsable Marketplace — scope opérationnel précis autour du site e.leclerc non alimentaire. Priorités : amélioration des parcours, omnicanalité, nouveaux moyens de paiement.", "p": [{"l": "Amélioration des parcours clients", "d": "Optimiser les parcours sur le site e.leclerc — réduire les frictions dans le funnel", "p": "h"}, {"l": "Omnicanalité — Canaux de vente", "d": "Stocké, click & collect, retrait magasin — fluidifier l'omnicanalité", "p": "h"}, {"l": "Nouveaux moyens
