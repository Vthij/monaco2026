<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuri & Neil — Monaco 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:'Georgia','Times New Roman',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.logo{font-family:monospace;font-size:11px;letter-spacing:4px;color:#444;text-transform:uppercase;margin-bottom:48px;text-align:center}
.logo span{color:#a855f7}
h1{font-size:36px;font-weight:bold;letter-spacing:-1.5px;text-align:center;margin-bottom:8px;line-height:1.1}
.sub{color:#555;font-family:monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:56px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:640px}
.card{background:#111118;border:1px solid #1e1e2e;border-radius:12px;padding:24px 28px;text-decoration:none;color:inherit;transition:all .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--ac)}
.card:hover{border-color:var(--ac);transform:translateY(-2px);background:#13131f}
.name{font-size:20px;font-weight:bold;margin-bottom:4px;letter-spacing:-0.5px}
.role{font-family:monospace;font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.count{display:inline-block;background:var(--ac);color:#000;font-family:monospace;font-size:10px;font-weight:bold;padding:2px 8px;border-radius:3px;letter-spacing:1px}
.dates{font-family:monospace;font-size:10px;color:#444;margin-top:10px}
.footer{margin-top:56px;font-family:monospace;font-size:10px;color:#333;letter-spacing:2px;text-align:center}
@media(max-width:480px){.grid{grid-template-columns:1fr}h1{font-size:28px}}
</style>
</head>
<body>
<div class="logo">⊛ <span>YURI & NEIL</span></div>
<h1>Monaco 2026</h1>
<p class="sub">One to One · 10 – 12 Mars · Briefings équipe</p>
<div class="grid">

    <div class="count">15 RDVs</div>
    <div class="dates">Lun 10 · Mer 11</div>
  </a>
  <a class="card" href="christophe.html" style="--ac:#22d3ee">
    <div class="name">Christophe</div>
    <div class="role">LEROY</div>
    <div class="count">13 RDVs</div>
    <div class="dates">Lun 10 · Mer 11 · Jeu 12</div>
  </a>
  <a class="card" href="clement.html" style="--ac:#f97316">
    <div class="name">Clément</div>
    <div class="role">BOCCARDI</div>
    <div class="count">14 RDVs</div>
    <div class="dates">Lun 10 · Mer 11</div>
  </a>
  <a class="card" href="romain.html" style="--ac:#84cc16">

    <div class="count">15 RDVs</div>

</div>
<div class="footer">Confidentiel · Usage interne Y&N</div>
</body>
</html>
