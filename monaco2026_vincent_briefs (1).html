let current = 0;

function render() {
  const m = meetings[current];
  document.documentElement.style.setProperty('--accent', m.accent);

  // Update nav buttons
  document.getElementById('nav-buttons').innerHTML = meetings.map((mt, i) => `
    <button class="nav-btn ${i === current ? 'active' : ''}"
      style="${i === current ? `background:${mt.accent};border-color:${mt.accent};` : ''}"
      onclick="goto(${i})">${mt.company.split(/[\s–—]/)[0]}</button>
  `).join('');

  // Build card
  const card = `
    <div class="card-header">
      <div class="card-créneau">${m.date} · ${m.time}</div>
      <div class="card-company">${m.company}</div>
      <div class="card-sector">${m.sector}</div>
      <div class="tags">${m.tags.map(t => {
        const c = TAG_COLORS[t] || {bg:'#33333322',border:'#55555555',text:'#999'};
        return `<span class="tag" style="background:${c.bg};border-color:${c.border};color:${c.text}">${t}</span>`;
      }).join('')}</div>
    </div>

    <div class="section">
      <div class="section-title">Contacts</div>
      <div class="contacts">
        ${m.contacts.map(c => `
          <div class="contact-card">
            <div class="contact-name">${c.name}</div>
            <div class="contact-role">${c.role}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Contexte</div>
      <p class="text-block">${m.context}</p>
    </div>

    <div class="section">
      <div class="section-title">Leurs projets</div>
      <div class="projects">
        ${m.projects.map(p => `
          <div class="project-item">
            <div class="priority-dot priority-${p.p}"></div>
            <div>
              <div class="project-label">${p.label}</div>
              <div class="project-detail">${p.detail}</div>
            </div>
          </div>`).join('')}
      </div>
      <div class="priority-legend">
        <span style="color:#ef4444">● haute priorité</span>
        <span style="color:#f59e0b">● priorité moyenne</span>
        <span style="color:#555">● secondaire</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Notre angle — Y&N</div>
      <div class="angle-block" style="background:${m.accent}11;border-color:${m.accent}33">
        <p>${m.angle}</p>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Question d'ouverture</div>
      <div class="opening-block" style="border-color:${m.accent}">" ${m.opening} "</div>
    </div>

    <div class="section">
      <div class="section-title danger">⚠ Points de vigilance</div>
      <div class="watchout-block"><p>${m.watchout}</p></div>
    </div>

    <div id="bottom-nav">
      <button class="nav-arrow" onclick="goto(${current-1})" ${current===0?'disabled':''}>← précédent</button>
      <span id="counter">${current+1} / ${meetings.length}</span>
      <button class="nav-arrow next-btn" onclick="goto(${current+1})"
        style="background:${current===meetings.length-1?'transparent':m.accent};border-color:${current===meetings.length-1?'#2a2a3a':m.accent}"
        ${current===meetings.length-1?'disabled':''}>suivant →</button>
    </div>
  `;

  document.getElementById('main').innerHTML = card;
  window.scrollTo({ top: 0 });
}

function goto(i) {
  if (i < 0 || i >= meetings.length) return;
  current = i;
  render();
}

render();
</script>
